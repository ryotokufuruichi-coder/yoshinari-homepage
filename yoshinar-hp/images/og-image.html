<!DOCTYPE html>
<html><head><meta charset="UTF-8"/><style>
body{margin:0;width:1200px;height:630px;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,#f0f5ff 0%,#fff 60%);font-family:'Noto Sans JP',sans-serif;position:relative;overflow:hidden}
.bg{position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(59,130,246,0.1),transparent 70%);pointer-events:none}
.bg2{position:absolute;bottom:-80px;left:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(30,64,175,0.07),transparent 70%);pointer-events:none}
.card{text-align:center;z-index:1}
.logo{font-size:64px;font-weight:700;color:#0f172a;letter-spacing:-0.02em}
.tagline{font-family:Inter,sans-serif;font-size:18px;color:#64748b;letter-spacing:0.12em;margin-top:8px}
.divider{width:80px;height:3px;background:#1e40af;margin:28px auto}
.desc{font-size:20px;color:#475569;line-height:1.8}
</style></head><body>
<div class="bg"></div><div class="bg2"></div>
<div class="card">
<div class="logo">吉成株式会社</div>
<div class="tagline">YOSHINARI CORPORATION</div>
<div class="divider"></div>
<div class="desc">経営コンサルティング・マーケティング<br/>バックオフィス代行・FPサービス</div>
</div>
</body></html>
